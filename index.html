<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Middle-earth Map Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin:0; font-family: Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }
    .sidebar { position: absolute; top:10px; left:10px; z-index:1000; background:#fff; padding:8px; border-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.3); max-width:260px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="sidebar"><strong>Middle-earth Map</strong><div id="list"></div></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="lib/leaflet-ant-path.js"></script>
  <script>
    // real-world latitude/longitude bounds matching actual coordinate ranges in GeoJSON
    // Longitude range: 0.795 to 12.595 (11.8 units) → pixels depend on Hobbiton anchor
    // Latitude range: 44.17 to 49.87 (5.7 units) → pixels depend on Hobbiton anchor
    // Hobbiton anchor: [1.195, 48.47] → pixel [565.75, 651.5]
    const realBounds = { latMin: 44.17, latMax: 49.87, lonMin: 0.795, lonMax: 12.595 };

    // load the Middle-earth image to get its pixel dimensions before building map
    const img = new Image();
    img.src = 'middle-earth-map.png';
    img.onload = () => {
      const imgWidth = img.width;
      const imgHeight = img.height;
      const imgBounds = [[0,0], [imgHeight, imgWidth]]; // simple CRS points

      const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2 })
                    .setView([imgHeight/2, imgWidth/2], 0);

      L.imageOverlay(img.src, imgBounds).addTo(map);
      map.setMaxBounds(imgBounds);

      // conversion settings (can be tuned if points are misaligned)
      let scaleX = imgWidth / (realBounds.lonMax - realBounds.lonMin);
      let scaleY = imgHeight / (realBounds.latMax - realBounds.latMin);
      // Anchored to Hobbiton at pixel [565.75, 651.5] with full coordinate range
      let offsetX = 403.716;
      let offsetY = 8423.707;

      function toPixel(lat, lon) {
        // linear transformation: pixelX = lon * scaleX + offsetX
        //                      pixelY = -lat * scaleY + offsetY
        const x = lon * scaleX + offsetX;
        const y = -lat * scaleY + offsetY;
        return [y, x];
      }

      // Validation: log coordinate bounds on load (corners in lat/lon then convert to pixels)
      console.log('\n=== Map Configuration ===');
      console.log('Image dimensions: ' + imgWidth + 'x' + imgHeight);
      console.log('Coordinate bounds (original lat/lon):');
      console.log('  Longitude: ' + realBounds.lonMin + ' to ' + realBounds.lonMax);
      console.log('  Latitude: ' + realBounds.latMin + ' to ' + realBounds.latMax);
      console.log('Converted to pixels (corners):');
      const testCorners = [
        {lon: realBounds.lonMin, lat: realBounds.latMax, label: 'NW corner'},
        {lon: realBounds.lonMax, lat: realBounds.latMax, label: 'NE corner'},
        {lon: realBounds.lonMin, lat: realBounds.latMin, label: 'SW corner'},
        {lon: realBounds.lonMax, lat: realBounds.latMin, label: 'SE corner'}
      ];
      testCorners.forEach(corner => {
        const [py, px] = toPixel(corner.lat, corner.lon);
        console.log('  ' + corner.label + ': lon=' + corner.lon + ', lat=' + corner.lat + ' -> pixel [' + Math.round(px) + ', ' + Math.round(py) + ']');
      });
      console.log('======================\n');

      // add listener so you can click on map and inspect pixel coords
      map.on('click', e => {
        console.log('map click pixel coords', e.latlng);
        // show a temporary marker at click location
        L.circleMarker(e.latlng, {radius:4, color:'blue'}).addTo(map).bindPopup(e.latlng.toString()).openPopup();
      });

      fetch('locations.geojson')
        .then(res => res.json())
        .then(data => {
          const geojsonLayer = L.geoJSON(data, {
            onEachFeature: function(feature, layer) {
              const p = feature.properties || {};
              const html = `<b>${p.name || 'Unknown'}</b><br><i>${p.type || ''}</i><br>${p.description || ''}`;
              layer.bindPopup(html);
              const list = document.getElementById('list');
              const item = document.createElement('div');
              item.style.marginTop = '6px';
              item.innerHTML = `<a href="#" data-id="${p.id}">${p.name}</a>`;
              list.appendChild(item);
              item.querySelector('a').addEventListener('click', (e) => {
                e.preventDefault();
                map.fitBounds(layer.getBounds ? layer.getBounds() : layer.getLatLng().toBounds(0.5));
                layer.openPopup();
              });
            },
            pointToLayer: function(feature, latlng) {
              // GeoJSON coordinates are in [x, y] format (width, height)
              // Leaflet CRS.Simple expects [y, x] format, so swap them
              return L.marker([latlng.lat, latlng.lng]);
            }
          }).addTo(map);

          try {
            map.fitBounds(geojsonLayer.getBounds(), {padding:[40,40]});
          } catch(e) { /* single point fallback */ }
        })
        .catch(err => {
          console.error('Failed to load locations.geojson', err);
          alert('Could not load locations.geojson. Make sure the file is in the same folder as index.html.');
        });

      // Fellowship journey route (in pixel coordinates)
      const fellowshipCoords = [
        [245.8, 64.7],    // The Shire
        [326.0, 268.1],   // Bree
        [261.8, 376.6],   // Weathertop Amon Sûl
        [85.5, 566.4],    // Rivendell
        [213.7, 783.4],   // Moria
        [277.9, 891.9],   // Lothlórien
        [374.1, 973.2]    // Amon Hen
      ];
      const ant = L.polyline.antPath(fellowshipCoords, {
        delay: 400,
        dashArray: [10,20],
        weight: 4,
        color: '#8B0000',
        pulseColor: '#FFD700'
      }).addTo(map);
    };
  </script>
</body>
</html>
