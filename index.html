<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Middle-earth Map Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin:0; font-family: Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }
    .sidebar { position: absolute; top:10px; left:10px; z-index:1000; background:#fff; padding:8px; border-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.3); max-width:260px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="sidebar"><strong>Middle-earth Map</strong><div id="list"></div></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="lib/leaflet-ant-path.js"></script>
  <script>
    // real-world latitude/longitude bounds corresponding to the image overlay
    const realBounds = { latMin: 47.0, latMax: 52.0, lonMin: -2.5, lonMax: 8.5 };

    // load the Middle-earth image to get its pixel dimensions before building map
    const img = new Image();
    img.src = 'middle-earth-map.png';
    img.onload = () => {
      const imgWidth = img.width;
      const imgHeight = img.height;
      const imgBounds = [[0,0], [imgHeight, imgWidth]]; // simple CRS points

      const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2 })
                    .setView([imgHeight/2, imgWidth/2], 0);

      L.imageOverlay(img.src, imgBounds).addTo(map);
      map.setMaxBounds(imgBounds);

      function toPixel(lat, lon) {
        const x = (lon - realBounds.lonMin) / (realBounds.lonMax - realBounds.lonMin) * imgWidth;
        const y = (realBounds.latMax - lat) / (realBounds.latMax - realBounds.latMin) * imgHeight;
        return [y, x];
      }

      fetch('events.geojson')
        .then(res => res.json())
        .then(data => {
          const geojsonLayer = L.geoJSON(data, {
            onEachFeature: function(feature, layer) {
              const p = feature.properties || {};
              const html = `<b>${p.name || 'Unknown'}</b><br><i>${p.type || ''}</i><br>${p.date || ''}<br>${p.description || ''}`;
              layer.bindPopup(html);
              const list = document.getElementById('list');
              const item = document.createElement('div');
              item.style.marginTop = '6px';
              item.innerHTML = `<a href="#" data-id="${p.id}">${p.name}</a>`;
              list.appendChild(item);
              item.querySelector('a').addEventListener('click', (e) => {
                e.preventDefault();
                map.fitBounds(layer.getBounds ? layer.getBounds() : layer.getLatLng().toBounds(0.5));
                layer.openPopup();
              });
            },
            pointToLayer: function(feature, latlng) {
              const pix = toPixel(latlng.lat, latlng.lng);
              return L.marker(pix);
            }
          }).addTo(map);

          try {
            map.fitBounds(geojsonLayer.getBounds(), {padding:[40,40]});
          } catch(e) { /* single point fallback */ }
        })
        .catch(err => {
          console.error('Failed to load events.geojson', err);
          alert('Could not load events.geojson. Make sure the file is in the same folder as index.html.');
        });

      const fellowshipLatLon = [
        [51.0, -2.5],   // The Shire
        [50.5, -1.0],   // Bree
        [50.9, -0.2],   // Weathertop Amon Sûl
        [52.0, 1.2],    // Rivendell
        [51.2, 2.8],    // Moria
        [50.8, 3.6],    // Lothlorien
        [50.2, 4.2]     // Amon Hen
      ];
      const fellowshipCoords = fellowshipLatLon.map(([lat,lon]) => toPixel(lat, lon));
      const ant = L.polyline.antPath(fellowshipCoords, {
        delay: 400,
        dashArray: [10,20],
        weight: 4,
        color: '#8B0000',
        pulseColor: '#FFD700'
      }).addTo(map);
    };
  </script>
</body>
</html>
